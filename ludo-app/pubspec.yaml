version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  shared_preferences: ^2.2.0

  http: ^1.1.0
  socket_io_client: ^2.0.0
  webview_flutter: ^4.0.7

  flutter_webrtc: ^1.4.1
  permission_handler: ^11.3.1

  image_picker: ^1.0.0
  video_player: ^2.9.2
